name: 📝 기록 제출 (Record submission)
description: 새로운 공개 기록을 아카이브에 제안합니다.
title: "[기록] "
labels:
  - 기록제출
  - 검토필요
body:
  - type: markdown
    attributes:
      value: |
        ## 기록 제출

        알상무의 **공개 활동·영상·발언·밈·자료**를 출처와 함께 제안해 주세요.
        제출 전에 [기여 가이드](../blob/main/CONTRIBUTING.md)와 [기록 원칙](../blob/main/src/content/docs/principles.md)을 읽어 주세요.

        - 공개된 출처(유튜브, 기사, 공식 채널, 공개 인터뷰)만 사용합니다.
        - 사생활·루머·투자 조언·과도한 전재는 받지 않습니다.

  - type: input
    id: title
    attributes:
      label: 제목
      description: 기록 항목의 제목을 적어 주세요.
      placeholder: 예) 라이브에서 언급한 거시경제 전망
    validations:
      required: true

  - type: input
    id: date
    attributes:
      label: 날짜
      description: 자료가 공개된 날짜 (YYYY-MM-DD).
      placeholder: 2024-05-17
    validations:
      required: true

  - type: textarea
    id: sources
    attributes:
      label: 출처 URL
      description: 누구나 확인할 수 있는 공개 출처 링크를 한 개 이상 적어 주세요. 여러 개면 줄바꿈으로 구분합니다.
      placeholder: |
        https://www.youtube.com/watch?v=XXXXXXXXXXX
        https://example.com/article
    validations:
      required: true

  - type: input
    id: timestamp
    attributes:
      label: 타임스탬프
      description: 영상·오디오 내 발언/장면 위치 (있으면). 형식 예 MM:SS 또는 HH:MM:SS.
      placeholder: "12:34"
    validations:
      required: false

  - type: dropdown
    id: verification
    attributes:
      label: 검증 상태
      description: 제안하는 검증 상태를 골라 주세요. 최종 상태는 검토 후 운영 기준에 따라 조정될 수 있습니다.
      options:
        - 확인됨
        - 검토중
        - 보류
      default: 1
    validations:
      required: true

  - type: input
    id: tags
    attributes:
      label: 태그
      description: 분류용 키워드를 쉼표로 구분해 적어 주세요.
      placeholder: 시장, 밈, 발언
    validations:
      required: false

  - type: textarea
    id: summary
    attributes:
      label: 요약
      description: 한두 문장으로 맥락을 요약해 주세요. 발언을 길게 옮기거나 전사하지 마세요.
      placeholder: 어떤 맥락에서 나온 발언/장면인지 짧게 정리합니다.
    validations:
      required: true

  - type: checkboxes
    id: policy
    attributes:
      label: 정책 확인
      description: 아래 항목을 모두 확인해 주세요.
      options:
        - label: 이 기록은 **사생활·개인정보**(가족, 주소, 연락처, 사적 동선 등)를 포함하지 않습니다.
          required: true
        - label: 이 기록은 **출처 없는 루머·추측**이 아니며, 위에 공개 출처를 밝혔습니다.
          required: true
        - label: 이 기록은 **투자 조언**(매수/매도/보유 권유)이 아닙니다.
          required: true
        - label: 이 기록은 특정 개인·집단을 **공격·비하**하지 않으며, 저작물을 **과도하게 전재**하지 않았습니다.
          required: true
